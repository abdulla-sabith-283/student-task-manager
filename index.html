<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Task Manager</title>
  <link rel="stylesheet" href="style.css" />
  <!-- React 18 via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>
<body>
  <div id="root"></div>

  <script src="script.js"></script>
  <script>
    // ── Backend URL ────────────────────────────────────────────────────────────
    var API = 'https://your-render-url.onrender.com';

    // ── Shorthand ──────────────────────────────────────────────────────────────
    var h = React.createElement;
    var useState    = React.useState;
    var useEffect   = React.useEffect;

    // ──────────────────────────────────────────────────────────────────────────
    // LOGIN PAGE
    // ──────────────────────────────────────────────────────────────────────────
    function LoginPage(props) {
      var s = useState({ username: '', password: '' });
      var form = s[0]; var setForm = s[1];

      var e = useState('');
      var error = e[0]; var setError = e[1];

      var l = useState(false);
      var loading = l[0]; var setLoading = l[1];

      function handleLogin() {
        if (!form.username || !form.password) {
          setError('Please enter both fields.');
          return;
        }
        setLoading(true);
        setError('');
        apiRequest(API + '/api/login', 'POST', form)
          .then(function(data) {
            setLoading(false);
            if (data.success) {
              props.onLogin(data.username);
            }
          })
          .catch(function() {
            setLoading(false);
            setError('Invalid username or password.');
          });
      }

      function handleKey(e) {
        if (e.key === 'Enter') handleLogin();
      }

      return h('div', { className: 'login-page' },
        h('div', { className: 'login-box' },
          h('h1', null, '📚 Student Task Manager'),
          h('p',  null, 'Sign in to manage your study tasks'),

          h('div', { className: 'field' },
            h('label', null, 'Username'),
            h('input', {
              type: 'text',
              placeholder: 'Enter username',
              value: form.username,
              onChange: function(e) { setForm({ username: e.target.value, password: form.password }); },
              onKeyDown: handleKey
            })
          ),

          h('div', { className: 'field' },
            h('label', null, 'Password'),
            h('input', {
              type: 'password',
              placeholder: 'Enter password',
              value: form.password,
              onChange: function(e) { setForm({ username: form.username, password: e.target.value }); },
              onKeyDown: handleKey
            })
          ),

          error ? h('p', { className: 'error-msg' }, error) : null,

          h('button', {
            className: 'btn btn-primary btn-full',
            onClick: handleLogin,
            disabled: loading
          }, loading ? 'Signing in…' : 'Sign In'),

          h('p', { className: 'hint' },
            'Demo: ',
            h('code', null, 'student'),
            ' / ',
            h('code', null, 'pass123')
          )
        )
      );
    }

    // ──────────────────────────────────────────────────────────────────────────
    // TASK CARD
    // ──────────────────────────────────────────────────────────────────────────
    function TaskCard(props) {
      var task = props.task;
      var isCompleted = task.status === 'completed';

      return h('div', { className: 'task-card' + (isCompleted ? ' completed' : '') },

        h('div', { className: 'task-info' },
          h('div', { className: 'task-title' }, task.title),
          task.description
            ? h('div', { className: 'task-desc' }, task.description)
            : null,
          h('div', { className: 'task-meta' },
            h('span', { className: 'badge ' + getPriorityClass(task.priority) }, task.priority),
            h('span', { className: 'badge ' + (isCompleted ? 'badge-done' : 'badge-pending') },
              getStatusLabel(task.status)
            ),
            task.due_date
              ? h('span', { className: 'due-date' }, '📅 ' + formatDate(task.due_date))
              : null
          )
        ),

        h('div', { className: 'task-actions' },
          !isCompleted
            ? h('button', {
                className: 'btn btn-green',
                onClick: function() { props.onComplete(task.id); }
              }, '✓ Done')
            : null,
          h('button', {
            className: 'btn btn-red',
            onClick: function() { props.onDelete(task.id); }
          }, '✕')
        )
      );
    }

    // ──────────────────────────────────────────────────────────────────────────
    // ADD TASK FORM
    // ──────────────────────────────────────────────────────────────────────────
    function AddTaskForm(props) {
      var blank = { title: '', description: '', due_date: '', priority: 'Medium' };
      var f = useState(blank);
      var form = f[0]; var setForm = f[1];

      var e = useState('');
      var error = e[0]; var setError = e[1];

      function handleSubmit() {
        var err = validateTaskInput(form);
        if (err) { setError(err); return; }
        setError('');
        props.onAdd(form);
        setForm(blank);
      }

      function set(field) {
        return function(ev) {
          var updated = {};
          updated.title       = form.title;
          updated.description = form.description;
          updated.due_date    = form.due_date;
          updated.priority    = form.priority;
          updated[field] = ev.target.value;
          setForm(updated);
        };
      }

      return h('div', { className: 'add-form' },
        h('h2', null, '+ Add New Task'),

        h('div', { className: 'field' },
          h('label', null, 'Task Title'),
          h('input', {
            type: 'text',
            placeholder: 'e.g. Complete Maths Assignment',
            value: form.title,
            onChange: set('title')
          })
        ),

        h('div', { className: 'form-row' },
          h('div', { className: 'field' },
            h('label', null, 'Due Date'),
            h('input', { type: 'date', value: form.due_date, onChange: set('due_date') })
          ),
          h('div', { className: 'field' },
            h('label', null, 'Priority'),
            h('select', { value: form.priority, onChange: set('priority') },
              h('option', { value: 'High' },   'High'),
              h('option', { value: 'Medium' }, 'Medium'),
              h('option', { value: 'Low' },    'Low')
            )
          )
        ),

        h('div', { className: 'field' },
          h('label', null, 'Description (optional)'),
          h('textarea', {
            rows: 2,
            placeholder: 'Brief description of the task…',
            value: form.description,
            onChange: set('description')
          })
        ),

        error ? h('p', { className: 'error-msg' }, error) : null,

        h('button', { className: 'btn btn-primary', onClick: handleSubmit }, 'Add Task')
      );
    }

    // ──────────────────────────────────────────────────────────────────────────
    // DASHBOARD
    // ──────────────────────────────────────────────────────────────────────────
    function Dashboard(props) {
      var t = useState([]);
      var tasks = t[0]; var setTasks = t[1];

      var s = useState({ total: 0, completed: 0, pending: 0 });
      var summary = s[0]; var setSummary = s[1];

      function fetchTasks() {
        apiRequest(API + '/api/tasks', 'GET')
          .then(function(data) {
            setTasks(data.tasks);
            setSummary(data.summary);
          })
          .catch(function(err) { console.error(err); });
      }

      useEffect(function() { fetchTasks(); }, []);

      function handleAdd(form) {
        apiRequest(API + '/api/tasks', 'POST', form)
          .then(function() { fetchTasks(); })
          .catch(function(err) { console.error(err); });
      }

      function handleComplete(id) {
        apiRequest(API + '/api/tasks/' + id + '/complete', 'POST')
          .then(function() { fetchTasks(); })
          .catch(function(err) { console.error(err); });
      }

      function handleDelete(id) {
        apiRequest(API + '/api/tasks/' + id, 'DELETE')
          .then(function() { fetchTasks(); })
          .catch(function(err) { console.error(err); });
      }

      var progress = calculateProgress(summary.completed, summary.total);

      return h('div', { className: 'app' },

        // Header
        h('header', { className: 'header' },
          h('span', { className: 'header-title' }, '📚 Student Task Manager'),
          h('div', { className: 'header-right' },
            h('span', { className: 'header-user' }, '👤 ' + props.username),
            h('button', { className: 'btn btn-outline', onClick: props.onLogout }, 'Sign Out')
          )
        ),

        // Main
        h('main', { className: 'main' },

          // Summary cards
          h('div', { className: 'summary' },
            h('div', { className: 'summary-card total' },
              h('div', { className: 'num' }, summary.total),
              h('div', { className: 'lbl' }, 'Total Tasks')
            ),
            h('div', { className: 'summary-card done' },
              h('div', { className: 'num' }, summary.completed),
              h('div', { className: 'lbl' }, 'Completed')
            ),
            h('div', { className: 'summary-card pending' },
              h('div', { className: 'num' }, summary.pending),
              h('div', { className: 'lbl' }, 'Pending')
            )
          ),

          // Add form
          h(AddTaskForm, { onAdd: handleAdd }),

          // Task list
          h('div', { className: 'task-list-header' },
            h('h2', null, 'My Tasks'),
            h('span', { className: 'header-user' }, progress + '% complete')
          ),

          tasks.length === 0
            ? h('div', { className: 'empty' }, 'No tasks yet. Add one above!')
            : tasks.map(function(task) {
                return h(TaskCard, {
                  key: task.id,
                  task: task,
                  onComplete: handleComplete,
                  onDelete: handleDelete
                });
              })
        )
      );
    }

    // ──────────────────────────────────────────────────────────────────────────
    // ROOT APP
    // ──────────────────────────────────────────────────────────────────────────
    function App() {
      var u = useState(null);
      var user = u[0]; var setUser = u[1];

      if (user) {
        return h(Dashboard, { username: user, onLogout: function() { setUser(null); } });
      }
      return h(LoginPage, { onLogin: setUser });
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(App, null));
  </script>
</body>
</html>
